<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quản lý Chi tiêu AI{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/components/shared.css')}}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/components/modal.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/components/chatbot.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/components/layout.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/dashboard.css') }}">
    
    {% block extra_css %}{% endblock %}
    
    <script>
        // 1. Lấy biến tiền tệ từ DB
        window.USER_CURRENCY = "{% if user and user.settings %}{{ user.settings.currency }}{% else %}VND{% endif %}";
        
        // 2. Xác định Locale (Vùng)
        window.USER_LOCALE = window.USER_CURRENCY === 'USD' ? 'en-US' : 'vi-VN';

        // 3. Khởi tạo bộ định dạng dùng chung cho toàn hệ thống
        const globalFormatter = new Intl.NumberFormat(window.USER_LOCALE, {
            style: 'currency',
            currency: window.USER_CURRENCY,
            currencyDisplay: 'symbol',
            maximumFractionDigits: window.USER_CURRENCY === 'VND' ? 0 : 2
        });

        // 4. TẠO HÀM TOÀN CỤC: Bất kỳ file JS nào cũng gọi được hàm này
        window.formatMoney = function(amount) {
            // Ép kiểu về số (float) đề phòng data truyền vào là chuỗi
            return globalFormatter.format(parseFloat(amount));
        };
    </script>
</head>
<body>
    {% include 'components/sidebar.html' %}
    
    <main class="main-content">
        {% include 'components/messages.html' %}
        {% block content %}{% endblock %}
    </main>

    {% if session.get('user_role') != 'admin' %}
        {% include 'components/chatbot.html' %}
    {% endif %}
    
    {% block scripts %}{% endblock %}
    <script src="{{ url_for('static', filename='assets/js/chatbot.js') }}"></script>
    </body>
</html>
