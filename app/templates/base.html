<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quản lý Chi tiêu AI{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/admin.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/components/shared.css')}}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/components/modal.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/components/chatbot.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/components/layout.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/dashboard.css') }}">
    
    {% block extra_css %}{% endblock %}
    
<script>
        // 1. Cấu hình tiền tệ
        window.USER_CURRENCY = "{% if user and user.settings %}{{ user.settings.currency }}{% else %}VND{% endif %}";
        window.USER_LOCALE = window.USER_CURRENCY === 'USD' ? 'en-US' : 'vi-VN';

        // 2. KHAI BÁO TỶ GIÁ (Ví dụ: 1 USD = 25,400 VND)
        // Hệ thống ngầm hiểu toàn bộ Database đang lưu bằng VND
        window.EXCHANGE_RATE = 254000; 

        // 3. Khởi tạo bộ định dạng
        const globalFormatter = new Intl.NumberFormat(window.USER_LOCALE, {
            style: 'currency',
            currency: window.USER_CURRENCY,
            currencyDisplay: 'symbol',
            maximumFractionDigits: window.USER_CURRENCY === 'VND' ? 0 : 2
        });

        // 4. HÀM TOÀN CỤC: Tự động chia tỷ giá nếu user chọn USD
        window.formatMoney = function(amount) {
            let finalAmount = parseFloat(amount);

            // BÀI TOÁN QUY ĐỔI NẰM Ở ĐÂY:
            // Nếu User đang dùng USD, ta lấy tiền VND trong DB chia cho tỷ giá
            if (window.USER_CURRENCY === 'USD') {
                finalAmount = finalAmount / window.EXCHANGE_RATE;
            }

            return globalFormatter.format(finalAmount);
        };
        // 5. HÀM XỬ LÝ KHI MỞ FORM SỬA (Đưa số từ DB lên Input)
        // VD: DB là 254000 VND -> Nếu đang ở USD thì ô Input chỉ hiện số 10
        window.formatMoneyForInput = function(amount) {
            let finalAmount = parseFloat(amount) || 0;
            if (window.USER_CURRENCY === 'USD') {
                // Trả về số thập phân 2 chữ số (không kèm ký hiệu $) để đưa vào thẻ <input type="number">
                return parseFloat((finalAmount / window.EXCHANGE_RATE).toFixed(2));
            }
            return finalAmount;
        };

        // 6. HÀM XỬ LÝ KHI LƯU FORM (Đưa số từ Input về DB)
        // VD: Nhập 10 USD -> Nhân tỷ giá -> Gửi 254000 VND lên Backend
        window.parseMoneyToBase = function(inputAmount) {
            let amount = parseFloat(inputAmount) || 0;
            if (window.USER_CURRENCY === 'USD') {
                return amount * window.EXCHANGE_RATE;
            }
            return amount;
        };
    </script>
</head>
<body>
    {% include 'components/sidebar.html' %}
    
    <main class="main-content">
        {% include 'components/messages.html' %}
        {% block content %}{% endblock %}
    </main>

    {% if session.get('user_role') != 'admin' %}
        {% include 'components/chatbot.html' %}
    {% endif %}
    
    {% block scripts %}{% endblock %}
    <script src="{{ url_for('static', filename='assets/js/chatbot.js') }}"></script>
    </body>
</html>
